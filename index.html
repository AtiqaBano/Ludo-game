<!DOCTYPE html>
<html>
<head>
  <title>Ludo Game</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Background Ludo Image */
      background: url('ludo.png') no-repeat center center/cover;
    }

    /* Dark overlay */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .container {
      position: relative;
      text-align: center;
      color: white;
      z-index: 2;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px #f1c40f;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 40px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    .play {
      background: linear-gradient(45deg, #2ecc71, #27ae60);
      color: white;
    }

    .play:hover {
      transform: scale(1.1);
    }

    .exit {
      background: linear-gradient(45deg, #e74c3c, #c0392b);
      color: white;
    }

    .exit:hover {
      transform: scale(1.1);
    }

    /* Glow animation */
    h1 {
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #f1c40f; }
      to { text-shadow: 0 0 30px #f39c12; }
    }

  </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h1>🎮 LUDO GAME</h1>
  <p>Roll the dice and start your journey!</p>

  <button class="btn play" onclick="startGame()">▶ Start Game</button>
  <button class="btn exit" onclick="exitGame()">❌ Exit</button>
</div>

<script>
function startGame() {
  window.location.href = "players.html";
}

function exitGame() {
  alert("Thanks for playing 😊");
}
</script>

</body>
</html>
