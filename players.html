<!DOCTYPE html>
<html>
<head>
  <title>Select Players</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Background */
      background: url('ludo.png') no-repeat center center/cover;
    }

    /* Dark overlay */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
    }

    .container {
      position: relative;
      text-align: center;
      color: white;
      z-index: 2;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 20px;
      text-shadow: 0 0 15px #f1c40f;
    }

    p {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 40px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
      min-width: 200px;
    }

    .two {
      background: linear-gradient(45deg, #2ecc71, #27ae60);
      color: white;
    }

    .four {
      background: linear-gradient(45deg, #f1c40f, #f39c12);
      color: black;
    }

    .back {
      background: linear-gradient(45deg, #3498db, #2980b9);
      color: white;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    /* Glow animation */
    h1 {
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #f1c40f; }
      to { text-shadow: 0 0 25px #f39c12; }
    }

  </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h1>👥 Select Players</h1>
  <p>Choose how many players will play</p>

  <button class="btn two" onclick="goTo2()">🎮 2 Players</button><br>
  <button class="btn four" onclick="goTo4()">👥 4 Players</button><br>
  <button class="btn back" onclick="goBack()">⬅ Back</button>
</div>

<script>
function goTo2() {
  window.location.href = "board.html";
}

function goTo4() {
  window.location.href = "board4.html";
}

function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
